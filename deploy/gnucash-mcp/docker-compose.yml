services:
  gnucash-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      TZ: ${TZ:-Asia/Taipei}
    ports:
      - "${BIND_IP:?Set BIND_IP to the server bind address}:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - gnucash_mcp

  gnucash-mcp:
    image: ${GNUCASH_CLI_IMAGE:-ghcr.io/yuanqiuye/gcash:master}
    restart: unless-stopped
    environment:
      GNUCASH_BOOK: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@gnucash-db:5432/${POSTGRES_DB}"
      GNUCASH_BACKUP_DIR: /backups
      GNUCASH_LOCK_DIR: /locks
      GNUCASH_MCP_HTTP_API_KEY: ${GNUCASH_MCP_HTTP_API_KEY:?Set GNUCASH_MCP_HTTP_API_KEY}
      GNUCASH_API_KEY: ${GNUCASH_MCP_HTTP_API_KEY:?Set GNUCASH_MCP_HTTP_API_KEY}
      GNUCASH_MCP_READ_ONLY: ${GNUCASH_MCP_READ_ONLY:-0}
      GNUCASH_MCP_ALLOW_CREATE_ACCOUNT: ${GNUCASH_MCP_ALLOW_CREATE_ACCOUNT:-0}
      TZ: ${TZ:-Asia/Taipei}
    ports:
      - "${BIND_IP:?Set BIND_IP to the server bind address}:${MCP_HTTP_PORT:-8765}:8765"
    volumes:
      - ./backups:/backups
      - ./locks:/locks
    depends_on:
      gnucash-db:
        condition: service_healthy
    command: ["mcp-http", "--host", "0.0.0.0", "--port", "8765", "--path", "/mcp"]
    networks:
      - gnucash_mcp

networks:
  gnucash_mcp:
