# This architecture is designed for Option A (Server-local database collaboration)
# Start this PostgreSQL database on your server; both GnuCash and the Agent connect here
version: "3.8"

services:
  # GnuCash database
  gnucash-db:
    image: postgres:15-alpine
    container_name: gnucash_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gnucash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gnucash_password}
      POSTGRES_DB: ${POSTGRES_DB:-gnucash_data}
    ports:
      - "5432:5432" # Expose port 5432 locally or via VPN
    volumes:
      # [Physical decoupling] Store in project's postgres_data directory instead of Docker hidden volumes,
      # so you can easily archive or move it later
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - gnucash_net

  # Web UI console and API Server
  gnucash-cli:
    build: .
    image: gnucash-cli:latest
    container_name: gnucash_cli_agent
    environment:
      # After saving your GnuCash book to this PostgreSQL via "Save As", you can point
      # the CLI config to the database URL.
      # Format: postgresql://<usr>:<password>@<host>:<port>/<db>
      GNUCASH_BOOK: "postgresql://${POSTGRES_USER:-gnucash}:${POSTGRES_PASSWORD:-gnucash_password}@gnucash-db/${POSTGRES_DB:-gnucash_data}"
      # Optional: Set API Key for enhanced security (Agent requests must include X-API-Key header)
      # Recommended: use a .env file to set GNUCASH_API_KEY, do not hardcode in docker-compose.yml
      GNUCASH_API_KEY: ${GNUCASH_API_KEY:-your-secret-api-key}
    ports:
      - "8000:8000" # Web UI / API access port
    volumes:
      # Mount local .backups directory into the container workspace so all automatic backups
      # are permanently saved on the server disk
      - ./.backups:/app/.backups
    networks:
      - gnucash_net
    depends_on:
      - gnucash-db
    command: ["gcash", "serve", "--host", "0.0.0.0", "--port", "8000"]

networks:
  gnucash_net:
